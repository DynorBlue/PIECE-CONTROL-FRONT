<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piece Control · BYD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="text-center mb-4">
      <img src="images/logo_BYD.png" alt="BYD Logo" class="login-logo">
      <h2 class="login-title">Piece Control</h2>
      <p class="login-subtitle">BYD · Gestión de Piezas</p>
    </div>
    <form id="loginForm" autocomplete="off">
      <div class="mb-3">
        <label for="username" class="form-label">Usuario</label>
        <input type="text" class="form-control" id="username" placeholder="Ingrese usuario" autocomplete="username">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" placeholder="Ingrese contraseña" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-byd w-100" id="loginBtn">
        <span id="loginBtnText">Iniciar Sesión</span>
        <span id="loginBtnSpinner" class="spinner-border spinner-border-sm d-none"></span>
      </button>
    </form>
  </div>
</div>

<div id="dashboardScreen" class="d-none">
  <nav class="navbar navbar-byd">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="images/logo_BYD.png" alt="BYD" height="32" class="me-2">
        Piece Control
      </a>
      <div class="d-flex align-items-center gap-2">
        <span class="badge bg-light text-dark py-2 px-3 d-none d-md-flex align-items-center">
          <i class="bi bi-person-circle me-1"></i>
          <span id="displayUser">admin</span>
        </span>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4">
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-white d-flex justify-content-between align-items-center py-3" role="button" data-bs-toggle="collapse" data-bs-target="#filterCollapse" aria-expanded="true">
        <h5 class="mb-0 fw-bold"><i class="bi bi-funnel me-2 text-byd"></i>Filtros</h5>
        <i class="bi bi-chevron-up" id="filterToggleIcon"></i>
      </div>
      <div class="collapse show" id="filterCollapse">
        <div class="card-body pt-0">
          <div class="row g-3 mt-2">
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small">Number Part</label>
              <input type="text" class="form-control form-control-sm" id="filterNumberPart" placeholder="Buscar...">
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small">VIN</label>
              <input type="text" class="form-control form-control-sm" id="filterVin" placeholder="Buscar...">
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small">Stock</label>
              <select class="form-select form-select-sm" id="filterStock">
                <option value="">Todos</option>
                <option value="BIG">BIG</option>
                <option value="LITTLE">LITTLE</option>
              </select>
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small">Status</label>
              <select class="form-select form-select-sm" id="filterStatus">
                <option value="">Todos</option>
                <option value="CREATED">CREATED</option>
                <option value="ACTIVE">ACTIVE</option>
                <option value="THIRTY_DAYS">THIRTY_DAYS</option>
                <option value="SIXTY_DAYS">SIXTY_DAYS</option>
                <option value="DESTROYED">DESTROYED</option>
                <option value="LOST">LOST</option>
              </select>
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small">Operator</label>
              <input type="text" class="form-control form-control-sm" id="filterOperator" placeholder="Buscar...">
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small">Date Entry Desde</label>
              <input type="date" class="form-control form-control-sm" id="filterDateEntryFrom">
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small">Date Entry Hasta</label>
              <input type="date" class="form-control form-control-sm" id="filterDateEntryTo">
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small">Reporting Date Desde</label>
              <input type="date" class="form-control form-control-sm" id="filterReportingDateFrom">
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small">Reporting Date Hasta</label>
              <input type="date" class="form-control form-control-sm" id="filterReportingDateTo">
            </div>
          </div>
          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-byd btn-sm px-4" id="applyFilterBtn">
              <i class="bi bi-search me-1"></i>Filtrar
            </button>
            <button class="btn btn-outline-secondary btn-sm px-4" id="clearFilterBtn">
              <i class="bi bi-x-circle me-1"></i>Limpiar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <h4 class="mb-0 fw-bold">
        <i class="bi bi-box-seam me-2 text-byd"></i>Piezas
        <span class="badge bg-byd ms-2" id="totalPiecesBadge">0</span>
      </h4>
      <button class="btn btn-byd" id="createPieceBtn">
        <i class="bi bi-plus-lg me-1"></i>Nueva Pieza
      </button>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="piecesTable">
            <thead class="table-byd-header">
              <tr>
                <th class="text-center" style="width:60px">ID</th>
                <th>Number Part</th>
                <th>VIN</th>
                <th>Vehicle</th>
                <th>Description</th>
                <th>Operator</th>
                <th class="text-center">Stock</th>
                <th class="text-center">Status</th>
                <th>Date Entry</th>
                <th class="text-center" style="width:120px">Acciones</th>
              </tr>
            </thead>
            <tbody id="piecesTableBody">
              <tr>
                <td colspan="10" class="text-center text-muted py-5">
                  <div class="spinner-border text-byd mb-2" role="status">
                    <span class="visually-hidden">Cargando...</span>
                  </div>
                  <div class="small">Cargando piezas...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="card-footer bg-white d-flex flex-wrap justify-content-between align-items-center gap-2 px-3 py-3" id="paginationFooter">
        <small class="text-muted" id="paginationInfo">Mostrando 0-0 de 0 piezas</small>
        <div class="d-flex align-items-center gap-2">
          <label class="small text-muted mb-0 d-none d-md-inline">Filas:</label>
          <select class="form-select form-select-sm" id="pageSizeSelect" style="width:auto;min-width:70px">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
          </select>
          <nav>
            <ul class="pagination pagination-sm mb-0" id="paginationNav"></ul>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="createModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-byd text-white py-3">
        <h5 class="modal-title fw-bold"><i class="bi bi-plus-circle me-2"></i>Nueva Pieza</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="createForm" autocomplete="off">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Number Part <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="numberPart" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">VIN <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="vin" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Reporting Date</label>
              <input type="datetime-local" class="form-control" name="reportingDate">
            </div>
            <div class="col-md-6">
              <label class="form-label">Claim App. Form <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="claimApplicationForm" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Vehicle <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="vehiculo" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Operator <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="operator" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Date Entry <span class="text-danger">*</span></label>
              <input type="datetime-local" class="form-control" name="dateEntry" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Stock <span class="text-danger">*</span></label>
              <select class="form-select" name="stock" required>
                <option value="">Seleccione...</option>
                <option value="BIG">BIG</option>
                <option value="LITTLE">LITTLE</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea class="form-control" name="description" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-byd px-4" id="saveCreateBtn">
          <span id="saveCreateText">Crear Pieza</span>
          <span id="saveCreateSpinner" class="spinner-border spinner-border-sm d-none"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-byd text-white py-3">
        <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i>Editar Pieza</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editForm" autocomplete="off">
          <input type="hidden" name="idPiece">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Number Part</label>
              <input type="text" class="form-control" name="numberPart">
            </div>
            <div class="col-md-6">
              <label class="form-label">VIN</label>
              <input type="text" class="form-control" name="vin">
            </div>
            <div class="col-md-6">
              <label class="form-label">Reporting Date</label>
              <input type="datetime-local" class="form-control" name="reportingDate">
            </div>
            <div class="col-md-6">
              <label class="form-label">Claim App. Form</label>
              <input type="text" class="form-control" name="claimApplicationForm">
            </div>
            <div class="col-md-6">
              <label class="form-label">Vehicle</label>
              <input type="text" class="form-control" name="vehiculo">
            </div>
            <div class="col-md-6">
              <label class="form-label">Operator</label>
              <input type="text" class="form-control" name="operator">
            </div>
            <div class="col-md-6">
              <label class="form-label">Date Entry</label>
              <input type="datetime-local" class="form-control" name="dateEntry">
            </div>
            <div class="col-md-6">
              <label class="form-label">Stock</label>
              <select class="form-select" name="stock">
                <option value="">Seleccione...</option>
                <option value="BIG">BIG</option>
                <option value="LITTLE">LITTLE</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Status</label>
              <select class="form-select" name="status">
                <option value="">Seleccione...</option>
                <option value="CREATED">CREATED</option>
                <option value="ACTIVE">ACTIVE</option>
                <option value="THIRTY_DAYS">THIRTY_DAYS</option>
                <option value="SIXTY_DAYS">SIXTY_DAYS</option>
                <option value="DESTROYED">DESTROYED</option>
                <option value="LOST">LOST</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea class="form-control" name="description" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-byd px-4" id="saveEditBtn">
          <span id="saveEditText">Guardar Cambios</span>
          <span id="saveEditSpinner" class="spinner-border spinner-border-sm d-none"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="viewModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-byd text-white py-3">
        <h5 class="modal-title fw-bold"><i class="bi bi-eye me-2"></i>Detalle de Pieza</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-4" id="viewContent"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="index.js"></script>
</body>
</html>
