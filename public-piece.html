<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piece Control · BYD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .piece-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.1); max-width: 480px; width: 100%; overflow: hidden; }
    .piece-card-header { background: #C8102E; color: #fff; padding: 24px; text-align: center; }
    .piece-card-header h1 { font-size: 1.25rem; margin: 0; font-weight: 700; }
    .piece-card-body { padding: 24px; }
    .piece-card-body dl { margin: 0; }
    .piece-card-body dt { font-size: .75rem; text-transform: uppercase; color: #6c757d; margin-top: 12px; letter-spacing: .5px; }
    .piece-card-body dd { font-size: 1rem; margin: 0 0 0 0; font-weight: 500; }
    .piece-card-body dt:first-child { margin-top: 0; }
    .loading { text-align: center; padding: 40px; color: #6c757d; }
    .loading .spinner { width: 40px; height: 40px; margin: 0 auto 12px; border: 4px solid #e9ecef; border-top-color: #C8102E; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-card { text-align: center; padding: 40px; color: #C8102E; }
    .error-card i { font-size: 3rem; margin-bottom: 12px; }
    .badge { font-size: .8rem; padding: 4px 12px; }
  </style>
</head>
<body>
  <div class="piece-card" id="card">
    <div class="piece-card-header">
      <h1><i class="bi bi-upc-scan me-2"></i>Piece Control · BYD</h1>
    </div>
    <div class="piece-card-body" id="cardBody">
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <div>Consultando pieza...</div>
      </div>
      <div class="error-card d-none" id="errorState">
        <i class="bi bi-exclamation-triangle"></i>
        <p id="errorMessage">No se encontró la pieza</p>
      </div>
      <div class="d-none" id="pieceData">
        <dl>
          <dt>Número de parte</dt>
          <dd id="pNumberPart">—</dd>
          <dt>VIN</dt>
          <dd id="pVin">—</dd>
          <dt>Vehículo</dt>
          <dd id="pVehiculo">—</dd>
          <dt>Descripción</dt>
          <dd id="pDescription">—</dd>
          <dt>Operador</dt>
          <dd id="pOperator">—</dd>
          <dt>Stock</dt>
          <dd id="pStock">—</dd>
          <dt>Estado</dt>
          <dd id="pStatus">—</dd>
          <dt>Fecha Ingreso</dt>
          <dd id="pDateEntry">—</dd>
        </dl>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://piece-control-api.onrender.com/api';

    (async () => {
      const params = new URLSearchParams(window.location.search);
      const qrUuid = params.get('qrUuid');

      if (!qrUuid) {
        document.getElementById('loadingState').classList.add('d-none');
        const err = document.getElementById('errorState');
        err.classList.remove('d-none');
        document.getElementById('errorMessage').textContent = 'QR inválido: falta el identificador';
        return;
      }

      try {
        const res = await fetch(`${API_URL}/public/qr/${encodeURIComponent(qrUuid)}`);
        if (!res.ok) throw new Error('Pieza no encontrada');
        const data = await res.json();

        document.getElementById('loadingState').classList.add('d-none');
        document.getElementById('pieceData').classList.remove('d-none');

        document.getElementById('pNumberPart').textContent = data.numberPart || '—';
        document.getElementById('pVin').textContent = data.vin || '—';
        document.getElementById('pVehiculo').textContent = data.vehiculo || '—';
        document.getElementById('pDescription').textContent = data.description || '—';
        document.getElementById('pOperator').textContent = data.operator || '—';
        document.getElementById('pStock').textContent = data.stock || '—';
        document.getElementById('pStatus').textContent = data.status || '—';
        document.getElementById('pDateEntry').textContent = data.dateEntry ? new Date(data.dateEntry).toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
      } catch (err) {
        document.getElementById('loadingState').classList.add('d-none');
        const errEl = document.getElementById('errorState');
        errEl.classList.remove('d-none');
        document.getElementById('errorMessage').textContent = err.message || 'Error al consultar la pieza';
      }
    })();
  </script>
</body>
</html>
